<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <title>orien-live｜軌跡再生</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
/*
  <link rel="stylesheet" href="https://unpkg.com" />
  <script src="https://unpkg.com"></script>
  <script src="https://cloudflare.com"></script>
  <script src="https://unpkg.com"></script>
*/
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script src="https://cloudflare.com"></script>

  
  
  <style>
    body { margin: 0; padding: 0; }
    #map { width: 100%; height: 90vh; }
    .ui { height: 10vh; display: flex; align-items: center; padding: 0 20px; gap: 15px; background: #fff; }
  </style>
</head>
<body>

<div class="ui">
  <button id="btn" style="padding: 10px 20px;">▶ 再生</button>
  <input type="range" id="range" min="1" max="100" value="20">
  <span><span id="speed">20</span>倍速</span>
</div>
<div id="map"></div>

<script>
  // GASのURL
  const GAS_URL = "https://script.google.com/macros/s/AKfycby4HBP8PGsJUuqnA0edrDcEkkhHHx0vshk9fSWvm5cBZqaeCa2DYcHQe6ASQEwpGoo6/exec";
  
  const map = L.map("map").setView([34.4, 132.4], 13);
  let player;

  L.tileLayer("https://gsi.go.jp{z}/{x}/{y}.png", {
    attribution: "© 国土地理院"
  }).addTo(map);

  async function load() {
    const res = await fetch(GAS_URL);
    const data = await res.json(); // { logs: [{name: "A", xml: "..."}, ...] }

    // 同時スタート補正：各GPXを相対時間（0ms〜）に変換
    const tracks = data.logs.map(log => {
      const gpx = new gpxParser();
      gpx.parse(log.xml);
      const pts = gpx.tracks[0].points;
      const t0 = new Date(pts[0].time).getTime();
      return pts.map(p => ({
        lat: p.lat, lng: p.lon,
        time: new Date(p.time).getTime() - t0
      }));
    });

    // 再生プレイヤー初期化
    player = new L.TrackPlayer(tracks, {
      speed: 20,
      marker: (i) => L.divIcon({
        html: `<b style="color:blue; white-space:nowrap;">🏃${data.logs[i].name}</b>`
      })
    }).addTo(map);
  }

  document.getElementById('btn').onclick = () => player && player.start();
  
  document.getElementById('range').oninput = (e) => {
    const v = Number(e.target.value);
    document.getElementById('speed').innerText = v;
    if(player) player.setSpeed(v);
  };

  load();
</script>
</body>
</html>
