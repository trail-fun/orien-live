<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="https://unpkg.com" />
  <script src="https://unpkg.com"></script>
  <style>#map { height: 500px; }</style>
</head>
<body>
  <div id="map"></div>
  <script>
    const map = L.map('map').setView([34.39, 132.48], 13); // 広島周辺を初期表示
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    async function loadMarkers() {
      const response = await fetch("https://script.google.com/macros/s/AKfycbyZm-IIzgbk8KaX12tBHtgcX4w7cejKdR1SQZgukdC6Zl5M5e3N-DbVX5epVlzvgw/exec");
      const locations = await response.json();
      
      locations.forEach(loc => {
        L.marker([loc.lat, loc.lng])
          .addTo(map)
          .bindPopup(`${loc.name}<br>${loc.time}`);
      });
    }
    loadMarkers();
  </script>
</body>
</html>
