<!DOCTYPE html>
<html lang="ja">
https://unpkg.com/leaflet@1.9.4/dist/leaflet.css https://unpkg.com/leaflet@1.9.4/dist/leaflet.js

<body>

<div id="map"></div>

<script>
  /***********************
   * 設定値
   ***********************/
  const CENTER_LAT = 34.4;   // 広島付近
  const CENTER_LNG = 132.4;
  const ZOOM_LEVEL = 12;

  // ★ 後でGASのJSON URLに差し替える
  const DATA_URL = "crew_locations.json";

  // 何分更新がなければ「古い」と判断するか
  const OLD_MINUTES = 30;

  // 地図更新間隔（ミリ秒）
  const REFRESH_INTERVAL = 60000; // 1分


  /***********************
   * 地図初期化
   ***********************/
  const map = L.map("map").setView(
    [CENTER_LAT, CENTER_LNG],
    ZOOM_LEVEL
  );

  // 国土地理院地図
  L.tileLayer(
    "https://cyberjapandata.gsi.go.jp/xyz/std/{z}/{x}/{y}.png",
    {
      attribution: "地図情報 © 国土地理院"
    }
  ).addTo(map);

  const markerLayer = L.layerGroup().addTo(map);


  /***********************
   * クルー位置を更新
   ***********************/
  function updateMap() {
    fetch(DATA_URL + "?t=" + Date.now())
      .then(res => res.json())
      .then(data => {
        markerLayer.clearLayers();

        const now = new Date();

        data.forEach(c => {
          const updated = new Date(c.time);
          const diffMin = (now - updated) / 60000;

          const marker = L.marker([c.lat, c.lng]);

          // 更新が古い場合は色を変える
          if (diffMin > OLD_MINUTES) {
            marker.getElement?.()?.classList.add("updated-old");
          }

          marker.bindPopup(
            `<strong>${c.name}</strong><br>
             最終更新：${updated.toLocaleTimeString()}`
          );

          marker.addTo(markerLayer);
        });
      })
      .catch(err => {
        console.error("位置データ取得失敗", err);
      });
  }

  // 初回実行
  updateMap();

  // 定期更新
  setInterval(updateMap, REFRESH_INTERVAL);
</script>

</body>
</html>
