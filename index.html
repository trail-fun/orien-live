地図上にクルー位置を表示

<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <title>orien-live｜クルー位置マップ</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  
  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js">  </script>

  <style>
    body {
      margin: 0;
      padding: 0;
    }
    #map {
      width: 100%;
      height: 100vh;
    }
  </style>
</head>
<body>

<div id="map"></div>

<script>
  // 地図の初期表示（広島周辺）
  const map = L.map("map").setView([34.4, 132.4], 12);

  // 国土地理院地図
  L.tileLayer(
    "https://cyberjapandata.gsi.go.jp/xyz/std/{z}/{x}/{y}.png",
    {
      attribution: "地図情報 © 国土地理院"
    }
  ).addTo(map);

  // --- ここから追加 ---
  fetch("crew_locations.json")
    .then(res => res.json())
    .then(data => {
      data.forEach(c => {
        L.marker([c.lat, c.lng])
          .addTo(map)
          .bindPopup(c.name);
      });
    });
  
</script>

</body>
</html>
