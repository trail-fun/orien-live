<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width">
</head>
<body>

<button onclick="sendLocation()">位置を送信</button>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbwmUePuEdRvPA_9Z8Tk5S8k3bJqRatsXOb5gbL4BCXjDm4VJPO5XGW-nM2yz6hJAz0y/exec";

function sendLocation() {
  navigator.geolocation.getCurrentPosition(
    (pos) => {
      const data = {
        name: "クルーA",
        lat: pos.coords.latitude,
        lng: pos.coords.longitude
      };

      fetch(API_URL, {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify(data)
      })
      .then(res => {
        if (!res.ok) {
          throw new Error("HTTP error " + res.status);
        }
        return res.text();
      })
      .then(text => {
        console.log("✅ GAS response", text);
        alert("送信しました");
      })
      .catch(err => {
        console.error("❌ fetch エラー", err);
        alert("エラーが発生しました。Consoleを確認してください");
      });
    },
    (err) => {
      console.error("❌ 位置取得エラー", err);
      alert("位置情報を取得できませんでした");
    }
  );
}
</script>

</body>
</html>
