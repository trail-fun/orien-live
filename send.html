<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width">
</head>
<body>

<button onclick="sendLocation()">位置を送信</button>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbzjdbNRo_VGpVjDZ3S4bA5BPNOyWbrVXLFcbAyon_kym2L8yrpwe5uCKIw35vUiipCS/exec";

function sendLocation() {
  navigator.geolocation.getCurrentPosition(
    (pos) => {
      const data = {
        name: "クルーA",
        lat: pos.coords.latitude,
        lng: pos.coords.longitude
      };

      fetch(API_URL, {
        method: "POST",
        headers: {
          "Content-Type": "text/plain"
        },
        body: JSON.stringify(data)
      })
      .then(res => {
        if (!res.ok) {
          throw new Error("HTTP error " + res.status);
        }
        return res.text();
      })
      .then(text => {
        console.log("✅ GAS response:", text);
        alert("送信しました");
      })
      .catch(err => {
        console.error("❌ fetch error:", err);
        alert("送信に失敗しました（Consoleを確認）");
      });
    },
    (err) => {
      console.error("❌ 位置情報エラー:", err);
      alert("位置情報を取得できませんでした");
    }
  );
}
</script>

</body>
</html>
