<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>位置送信</title>
</head>
<body>

<button onclick="sendLocation()">位置を送信</button>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbzjdbNRo_VGpVjDZ3S4bA5BPNOyWbrVXLFcbAyon_kym2L8yrpwe5uCKIw35vUiipCS/exec";

function sendLocation() {
  navigator.geolocation.getCurrentPosition(
    (pos) => {
      const payload = {
        name: "クルーA",
        lat: pos.coords.latitude,
        lng: pos.coords.longitude
      };


      fetch(API_URL, {
        method: "POST",
        body: JSON.stringify({
          name: "クルーA",
          lat: pos.coords.latitude,
          lng: pos.coords.longitude
        })
      })
        .then(() => alert("送信しました"))
        .catch(e => {
          console.error(e);
          alert("送信失敗");
        });

      
/*
      // レスポンスは読まない（Safari安定）
      fetch(API_URL, {
        method: "POST",
        headers: {
          // Simple Request にして Preflight を回避
          "Content-Type": "text/plain"
        },
        body: JSON.stringify(payload)
      })
      .then(() => {
        // 成功したとみなす（GAS用途ではこれでOK）
        alert("送信しました");
      })
      .catch(err => {
        console.error("送信エラー:", err);
        alert("送信に失敗しました");
      });
      */
    },
    (err) => {
      console.error("位置情報エラー:", err);
      alert("位置情報を取得できませんでした");
    }
  );
}
</script>

</body>
</html>
