<!DOCTYPE html>
<html>
<body>
  <button id="postBtn">POST送信</button>
  <p id="result">ここに結果が出ます</p>

  <script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbzNDH4SsUh-YA3TI1cK-dVXVuzNP9piXll-Eze_oQk6qRNuJfpeWzX3yZTklYjJpEBC/exec";

    document.getElementById("postBtn").addEventListener("click", async () => {
      const resultEl = document.getElementById("result");
      resultEl.textContent = "送信中...";

      try {
        const response = await fetch(GAS_URL, {
          method: "POST",
          // GASのdoPostにデータを渡すための設定
          body: JSON.stringify({
            name: "クルーA",
            age: 25
          }),
          redirect: "follow" // これがないとエラーになります
        });

        const text = await response.text();
        resultEl.textContent = text;

      } catch (error) {
        resultEl.textContent = "エラー: " + error;
      }
    });
  </script>
</body>
</html>
