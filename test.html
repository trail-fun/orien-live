<!DOCTYPE html>
<html>
<body>
  <button id="locBtn">現在地を送信</button>
  <p id="status">ボタンを押してください</p>

  <script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbxub13wLW1O_dbQDI5aF33QqWG99mqWP0k0TrEgjIlRMaZe7T6BfehdOgUTzrVYvWFU/exec";

    document.getElementById("locBtn").addEventListener("click", () => {
      const status = document.getElementById("status");
      status.textContent = "位置情報を取得中...";

      // 1. 位置情報を取得
      navigator.geolocation.getCurrentPosition(
        async (position) => {
          const lat = position.coords.latitude;
          const lng = position.coords.longitude;
          
          status.textContent = `送信中... (${lat}, ${lng})`;

          try {
            // 2. GASへPOST送信
            const response = await fetch(GAS_URL, {
              method: "POST",
              body: JSON.stringify({
                name: "クルーA",
                latitude: lat,
                longitude: lng
              }),
              redirect: "follow"
            });

            const result = await response.text();
            status.textContent = "完了: " + result;

          } catch (error) {
            status.textContent = "送信失敗: " + error;
          }
        },
        (error) => {
          status.textContent = "位置情報の取得に失敗しました: " + error.message;
        }
      );
    });
  </script>
</body>
</html>
