<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>位置情報送信</title>
</head>
<body>

  <h3>クルー選択</h3>
  <select id="crewSelect">
    <option value="クルーA">クルーA</option>
    <option value="クルーB">クルーB</option>
    <option value="クルーC">クルーC</option>
  </select>

  <button id="locBtn" style="margin-left: 10px;">現在地を送信</button>
  
  <p id="status">クルーを選択してボタンを押してください</p>

  <script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbykgiTjwENn3Pqzi42WWxTnzlE9lbvk3krsze2JfocwirYhbqeBwZch7yI4FTNi_L0/exec";

    document.getElementById("locBtn").addEventListener("click", () => {
      const status = document.getElementById("status");
      const crewName = document.getElementById("crewSelect").value; // 選択された値を取得

      status.textContent = `${crewName} の位置情報を取得中...`;

      navigator.geolocation.getCurrentPosition(
        async (position) => {
          const lat = position.coords.latitude;
          const lng = position.coords.longitude;
          
          status.textContent = `送信中... (${lat}, ${lng})`;

          try {
            const response = await fetch(GAS_URL, {
              method: "POST",
              body: JSON.stringify({
                name: crewName, // ここにセット
                latitude: lat,
                longitude: lng,
                timestamp: new Date().toLocaleString()
              }),
              redirect: "follow"
            });

            const result = await response.text();
            status.textContent = "サーバー回答: " + result;

          } catch (error) {
            status.textContent = "送信失敗: " + error;
          }
        },
        (error) => {
          status.textContent = "位置情報の取得に失敗: " + error.message;
        }
      );
    });
  </script>
</body>
</html>
