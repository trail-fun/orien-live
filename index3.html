<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <title>orien-live｜クルー位置マップ</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- 以下LeafletのJavaScriptとCSS -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<script src="https://cloudflare.com"></script>

  <style>
    body {
      margin: 0;
      padding: 0;
    }
    #map {
      width: 100%;
      height: 100vh;
    }
  </style>
</head>
<body>

<div id="map"></div>

<script>
  /********************
   * 設定
   ********************/
  const CENTER_LAT = 34.4;
  const CENTER_LNG = 132.4;
  const ZOOM_LEVEL = 12;

  const DATA_URL = "crew_locations.json";
  const REFRESH_INTERVAL = 60000; // 1分（ミリ秒）

   /********************
   * 地図初期化
   ********************/
  const map = L.map("map").setView(
    [CENTER_LAT, CENTER_LNG],
    ZOOM_LEVEL
  );

  // 国土地理院地図
  L.tileLayer(
    "https://cyberjapandata.gsi.go.jp/xyz/std/{z}/{x}/{y}.png",
    {
      attribution: "地図情報 © 国土地理院"
    }
  ).addTo(map);


/**/
  // マーカー専用レイヤー
  const markerLayer = L.layerGroup().addTo(map);

  /********************
   * マーカー更新処理
   ********************/
  async function loadMarkers() {
  const response = await fetch("https://script.google.com/macros/s/AKfycbz4K3Wckd4-ZfBGCMqAZf5maDSLynHxNcpbT-fmTl26KyxlWf5bwbJcp6ftBIvjWj_m/exec");
  const data = await response.json();
  
     // 1. CP（コントロールポイント）の表示
    data.forEach(cp => {
      console.write(cp.order);
      const pos = [cp.lat, cp.lng];
      if (cp.order === 's') {
        // スタート：△
        L.polygon([[cp.lat+0.0006, cp.lng], [cp.lat-0.0004, cp.lng-0.0005], [cp.lat-0.0004, cp.lng+0.0005]], 
          {color: 'red', fill: false, weight: 3}).addTo(map).bindTooltip("Start");
      } else if (cp.order === 'g') {
        // ゴール：◎
        L.circle(pos, {radius: 25, color: 'red', fill: false, weight: 3}).addTo(map);
        L.circle(pos, {radius: 15, color: 'red', fill: false, weight: 3}).addTo(map).bindTooltip("Goal");
      } else {
        // 通常CP：⭕️
        L.circle(pos, {radius: 20, color: 'red', fill: false, weight: 3}).addTo(map).bindTooltip(cp.name);
      }
    });
}  
  /********************
   * 初回読み込み & 自動更新
   ********************/
  loadMarkers();                         // ページ表示時
  setInterval(loadMarkers, REFRESH_INTERVAL); // 定期更新

</script>

</body>
</html>
