<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>位置送信</title>
</head>
<body>

<button onclick="sendLocation()">位置を送信</button>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbzjdbNRo_VGpVjDZ3S4bA5BPNOyWbrVXLFcbAyon_kym2L8yrpwe5uCKIw35vUiipCS/exec";

function sendLocation() {
  navigator.geolocation.getCurrentPosition(
    (pos) => {
      const url =
        API_URL +
        "?name=クルーA" +
        "&lat=" + pos.coords.latitude +
        "&lng=" + pos.coords.longitude +
        "&t=" + Date.now();
//デバッグ用
      console.log(url)

        });
    },
    (err) => {
      console.error(err);
      alert("位置情報を取得できませんでした");
    }
*/
  );
}
</script>

</body>
</html>
